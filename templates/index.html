<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/static/img/user-interface.png" type="image/x-icon">
    <!-- Importando Montserrat via Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <title>Login</title>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">
    <main class="bg-white rounded-2xl shadow-md p-10 w-full max-w-sm flex flex-col items-center gap-6">
        <!-- Logo -->
        <figure class="w-16 h-19 bg-lime-100 rounded-xl "><img src="/static/img/save-money.png"  alt="logo"  ></figure>
        <!-- Título -->
        <h1 class="text-xl font-light text-slate-800 tracking-tight" style="font-family: 'Montserrat', sans-serif;">
            Bem-vindo ao <span id="typed" class="text-lime-500 font-bold"></span><span id="cursor" class="text-lime-500 font-bold">|</span>
        </h1>
        <!-- Formulário -->
        <form class="w-full flex flex-col gap-4">
            <!-- Campo E-mail -->
            <section class="flex flex-col gap-1">
                <label class="text-sm text-slate-500 font-medium" for="email">E-mail</label>
                <input
                    id="email"
                    type="email"
                    placeholder="seu@email.com"
                    class="border border-slate-200 rounded-lg px-4 py-2.5 text-sm text-slate-800 bg-slate-50 outline-none focus:border-lime-200 focus:ring-2 focus:ring-lime-100 transition"
                />
            </section>
            <!-- Campo Senha -->
            <section class="flex flex-col gap-1">
                <label class="text-sm text-slate-500 font-medium" for="senha">Senha</label>
                <input
                    id="senha"
                    type="password"
                    placeholder="••••••••"
                    class="border border-slate-200 rounded-lg px-4 py-2.5 text-sm text-slate-800 bg-slate-50 outline-none focus:border-lime-400 focus:ring-2 focus:ring-lime-100 transition"
                />
            </section>
            <!-- Lembrar / Esqueci -->
            <nav class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 text-slate-500 cursor-pointer">
                    <input type="checkbox" class="accent-lime-400" />
                    Lembrar-me
                </label>
                <a href="#" class="text-lime-600 hover:underline font-medium">Esqueci a senha</a>
            </nav>
            <!-- Botão -->
            <button
                type="submit"
                class="w-full bg-lime-500 hover:bg-lime-500 text-slate-800 font-semibold py-3 rounded-lg transition active:scale-95"
            >
                <strong>Entrar</strong>
            </button>
        </form>
        <!-- Rodapé -->
        <footer class="text-sm text-slate-400">
            Não tem conta?
            <a href="#" class="text-lime-600 hover:underline font-medium">Cadastre-se</a>
        </footer>
    </main>
    <!--Tailwind e js pra animação -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/script.js"></script>
</body>
</html>
