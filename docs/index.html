<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./static/img/controlcash_logo-removebg-preview.png" type="image/x-icon">
    <!-- Importando  via Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./static/style.css">
    <title>Login</title>
</head>
<body class="min-h-screen bg-[#1B1B1D] flex items-center justify-center p-6">

    <!-- container geral que organiza logo/título e card lado a lado em telas grandes -->
    <div class="w-full max-w-5xl flex flex-col lg:flex-row items-center justify-center gap-10 lg:gap-20">

        <!-- bloco esquerdo (logo + boas-vindas) -->
        <div class="flex flex-col items-center lg:items-start text-center lg:text-left gap-6 lg:flex-1">
            <figure class="w-28 h-26 lg:w-60 lg:h-60 rounded-xl self-center">
               <img src="./static/img/controlcash_logo_glow.png" alt="logo" 
     class="w-full h-full object-contain" 
     style="filter: drop-shadow(0 0 1px rgba(255,255,255,0.5)) drop-shadow(0 0 1px rgba(255,255,255,0.5));">
            </figure>
            <h1 class="text-base lg:text-3xl font-light text-slate-100 tracking-tight font-unbounded">
                Bem-vindo ao <span id="typed" class="text-verde font-bold"></span><span id="cursor" class="text-verde font-bold">|</span>
            </h1>
        </div>

        <!-- Card de login: fundo branco com sombra forte para destacar do fundo escuro -->
        <main class="bg-white rounded-tl-3xl rounded-br-3xl shadow-2xl p-10 w-full max-w-sm flex flex-col items-center gap-6">
            <!-- Formulário -->
            <form class="w-full flex flex-col gap-4">
                <!-- Campo E-mail -->
                <section class="flex flex-col gap-1">
                    <label class="text-sm text-slate-500 font-medium" for="email">E-mail</label>
                    <input
                        id="email"
                        type="email"
                        placeholder="seu@email.com"
                        class="border border-slate-200 rounded-lg px-4 py-2.5 text-sm text-slate-800 bg-slate-50 outline-none focus:border-focus:ring-2 focus:ring-transition"
                    />
                </section>
                <!-- Campo Senha -->
                <section class="flex flex-col gap-1">
                    <label class="text-sm text-slate-500 font-medium" for="senha">Senha</label>
                    <input
                        id="senha"
                        type="password"
                        placeholder="••••••••"
                        class="border border-slate-200 rounded-lg px-4 py-2.5 text-sm text-slate-800 bg-slate-50 outline-none focus:border-focus:ring-2 focus:ring-transition"
                    />
                </section>
                <!-- Lembrar / Esqueci -->
                <nav class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-slate-500 cursor-pointer">
                        <input type="checkbox" class="accent-lime-400" />
                        Lembrar-me
                    </label>
                    <a href="#" class="text-lime-600 hover:underline font-medium">Esqueci a senha</a>
                </nav>
                <!-- Botão -->
                <button
                    type="submit"
                    class="w-full bg-verde hover:bg-green-500 text-slate-800 font-semibold py-3 rounded-lg transition active:scale-95"
                >
                    <strong>Entrar</strong>
                </button>
            </form>
            <!-- Rodapé -->
            <footer class="text-sm text-slate-400">
                Não tem conta?
                <a href="#" class="text-lime-600 hover:underline font-medium">Cadastre-se</a>
            </footer>
        </main>

    </div>

    <!--Tailwind e js pra animação -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./static/script.js"></script>
</body>
</html>
